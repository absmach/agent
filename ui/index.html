<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Magistrala Agent</title>
    <script src="main.js"></script>
  </head>

  <body>
    <div id="elm"></div>
    <script>
      var app = Elm.Main.init({
        node: document.getElementById('elm')
      });
      var MG = {};
      app.ports.fileToBase64.subscribe(function(content) {
        var encoded = btoa(unescape(encodeURIComponent(content)));
        app.ports.base64Result.send(encoded);
      });
    </script>
  </body>
</html>
