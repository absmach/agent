name: Continuous Integration

on:
  pull_request:

  push:
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/absmach

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "go.sum"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: |
          cd ui
          npm install

      - name: Check for changes in specific paths
        uses: dorny/paths-filter@v4
        id: changes
        with:
          base: ${{ github.event.before }}
          filters: |
            golang:
              - "*.go"
              - "**/*.go"
              - "go.mod"
              - "go.sum"

            ui:
              - "*.ts"
              - "*.js"
              - "**/*.ts"
              - "**/*.js"
              - "ui/**"

      - name: Run Golang Linter
        if: steps.changes.outputs.golang == 'true'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --config ./tools/config/.golangci.yaml

      - name: Run Golang tests
        if: steps.changes.outputs.golang == 'true'
        run: go test -v --race -covermode=atomic -coverprofile cover.out ./...

      - name: Upload coverage
        if: steps.changes.outputs.golang == 'true'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cover.out
          fail_ci_if_error: false

      - name: Run UI Linter
        if: steps.changes.outputs.ui == 'true'
        run: |
          cd ui
          npm run lint

      - name: Run UI Typecheck
        if: steps.changes.outputs.ui == 'true'
        run: |
          cd ui
          npm run typecheck

      - name: Build UI
        if: steps.changes.outputs.ui == 'true'
        run: make ui_prod

      - name: Build binary
        run: make all

  build-and-push:
    name: Build and Push Docker Image
    needs: [ci]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "go.sum"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Compute build metadata
        id: meta
        run: |
          echo "version=$(git describe --abbrev=0 --tags 2>/dev/null || echo 'v0.0.0')" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/riscv64
          push: true
          build-args: |
            SVC=agent
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            TIME=${{ steps.meta.outputs.time }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/agent:latest
            ${{ env.IMAGE_PREFIX }}/agent:${{ steps.meta.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
