name: DCO Check

on:
  pull_request:
    branches:
      - main

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        run: |
          base=${{ github.event.pull_request.base.sha }}
          head=${{ github.event.pull_request.head.sha }}

          missing=""
          for sha in $(git log --format='%H' "${base}..${head}"); do
            body=$(git log -1 --format='%B' "$sha")
            if ! echo "$body" | grep -q "^Signed-off-by: "; then
              missing="$missing\n  $sha $(git log -1 --format='%s' $sha)"
            fi
          done

          if [ -n "$missing" ]; then
            echo "The following commits are missing a Signed-off-by line."
            echo "Add one with: git commit --amend --signoff (or git rebase --signoff)"
            printf "$missing\n"
            exit 1
          fi

          echo "All commits have a DCO sign-off."
