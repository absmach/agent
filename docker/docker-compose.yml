name: magistrala_agent

networks:
  magistrala-agent-base-net:
    driver: bridge

volumes:
  nodered-data:

services:
  nodered:
    image: nodered/node-red:latest
    container_name: agent-nodered
    restart: on-failure
    entrypoint: ["/seed/scripts/entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "bootstrap:host-gateway"
    ports:
      - "1880:1880"
    networks:
      - magistrala-agent-base-net
    volumes:
      - ../scripts:/seed/scripts:ro
      - ./nodered:/seed/nodered:ro
      - nodered-data:/data
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    environment:
      TZ: UTC
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      MG_AGENT_MQTT_URL: ${MG_AGENT_MQTT_URL}
      MG_AGENT_MQTT_SKIP_TLS: ${MG_AGENT_MQTT_SKIP_TLS}
      MG_AGENT_BOOTSTRAP_URL: ${MG_AGENT_BOOTSTRAP_URL}
      MG_AGENT_BOOTSTRAP_EXTERNAL_ID: ${MG_AGENT_BOOTSTRAP_EXTERNAL_ID}
      MG_AGENT_BOOTSTRAP_EXTERNAL_KEY: ${MG_AGENT_BOOTSTRAP_EXTERNAL_KEY}
      MG_AGENT_BOOTSTRAP_RETRIES: ${MG_AGENT_BOOTSTRAP_RETRIES}
      MG_AGENT_BOOTSTRAP_RETRY_DELAY_SECONDS: ${MG_AGENT_BOOTSTRAP_RETRY_DELAY_SECONDS}
      MG_AGENT_BOOTSTRAP_SKIP_TLS: ${MG_AGENT_BOOTSTRAP_SKIP_TLS}
      MG_AGENT_GATEWAY_ID: ${MG_AGENT_GATEWAY_ID}
      MG_AGENT_GATEWAY_SECRET: ${MG_AGENT_GATEWAY_SECRET}
      MG_AGENT_TENANT_ID: ${MG_AGENT_TENANT_ID}
      MG_AGENT_CHANNEL: ${MG_AGENT_CHANNEL}
      MG_AGENT_CTRL_CHANNEL: ${MG_AGENT_CTRL_CHANNEL}
      MG_AGENT_HEARTBEAT_INTERVAL: ${MG_AGENT_HEARTBEAT_INTERVAL}

  agent:
    image: ${MG_AGENT_IMAGE}
    container_name: magistrala-agent
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "bootstrap:host-gateway"
      - "atom:host-gateway"
      - "rules:host-gateway"
    depends_on:
      - nodered
    ports:
      - "${MG_AGENT_HTTP_PORT}:${MG_AGENT_HTTP_PORT}"
    networks:
      - magistrala-agent-base-net
    environment:
      MG_AGENT_LOG_LEVEL: debug
      MG_AGENT_HTTP_PORT: ${MG_AGENT_HTTP_PORT}
      MG_AGENT_MQTT_URL: ${MG_AGENT_MQTT_URL}
      MG_AGENT_MQTT_SKIP_TLS: ${MG_AGENT_MQTT_SKIP_TLS}
      MG_AGENT_MQTT_MTLS: ${MG_AGENT_MQTT_MTLS}
      MG_AGENT_NODERED_URL: ${MG_AGENT_NODERED_URL}
      MG_AGENT_HEARTBEAT_INTERVAL: ${MG_AGENT_HEARTBEAT_INTERVAL}
      MG_AGENT_TERMINAL_SESSION_TIMEOUT: ${MG_AGENT_TERMINAL_SESSION_TIMEOUT}
      MG_AGENT_BOOTSTRAP_URL: ${MG_AGENT_BOOTSTRAP_URL}
      MG_AGENT_BOOTSTRAP_EXTERNAL_ID: ${MG_AGENT_BOOTSTRAP_EXTERNAL_ID}
      MG_AGENT_BOOTSTRAP_EXTERNAL_KEY: ${MG_AGENT_BOOTSTRAP_EXTERNAL_KEY}
      MG_AGENT_BOOTSTRAP_RETRIES: ${MG_AGENT_BOOTSTRAP_RETRIES}
      MG_AGENT_BOOTSTRAP_RETRY_DELAY_SECONDS: ${MG_AGENT_BOOTSTRAP_RETRY_DELAY_SECONDS}
      MG_AGENT_BOOTSTRAP_SKIP_TLS: ${MG_AGENT_BOOTSTRAP_SKIP_TLS}
      MG_AGENT_OTA_ENABLED: ${MG_AGENT_OTA_ENABLED}
      MG_AGENT_OTA_BINARY_PATH: ${MG_AGENT_OTA_BINARY_PATH}
      MG_AGENT_OTA_DOWNLOAD_DIR: ${MG_AGENT_OTA_DOWNLOAD_DIR}
      MG_AGENT_DEVICE_DB_PATH: ${MG_AGENT_DEVICE_DB_PATH}
      MG_AGENT_CONFIG_PATH: ${MG_AGENT_CONFIG_PATH}
      MG_AGENT_ATOM_URL: ${MG_AGENT_ATOM_URL}
      MG_AGENT_RULES_ENGINE_URL: ${MG_AGENT_RULES_ENGINE_URL}
      MG_AGENT_PROVISION_TOKEN: ${MG_PAT}
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - ../build:/var/lib/agent
