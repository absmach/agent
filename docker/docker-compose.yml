networks:
  magistrala-agent-base-net:
    driver: bridge

volumes:
  nodered-data:
  fluxmq-data:

services:
  fluxmq:
    image: ghcr.io/absmach/fluxmq:latest
    container_name: agent-fluxmq
    restart: on-failure
    user: "0:0"
    command: ["-config", "/etc/fluxmq/config.yaml"]
    ports:
      - "5692:5682"
    networks:
      - magistrala-agent-base-net
    volumes:
      - ./fluxmq/config.yaml:/etc/fluxmq/config.yaml:ro
      - fluxmq-data:/tmp/fluxmq

  nodered:
    image: nodered/node-red:latest
    container_name: agent-nodered
    restart: on-failure
    entrypoint: ["/seed/scripts/entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "1880:1880"
    networks:
      - magistrala-agent-base-net
    volumes:
      - ../scripts:/seed/scripts:ro
      - ./nodered:/seed/nodered:ro
      - ../configs/config.toml:/seed/config.toml:ro
      - nodered-data:/data
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    environment:
      TZ: UTC
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
  agent:
    image: ${MG_AGENT_IMAGE}
    container_name: magistrala-agent
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "bootstrap:host-gateway"
    depends_on:
      - fluxmq
      - nodered
    ports:
      - "${MG_AGENT_PORT}:${MG_AGENT_PORT}"
    networks:
      - magistrala-agent-base-net
    environment:
      MG_AGENT_CONFIG_FILE: /config.toml
      MG_AGENT_LOG_LEVEL: debug
      MG_AGENT_HTTP_PORT: ${MG_AGENT_PORT}
      MG_AGENT_MQTT_URL: ${MG_AGENT_MQTT_URL}
      MG_AGENT_MQTT_SKIP_TLS: ${MG_AGENT_MQTT_SKIP_TLS}
      MG_AGENT_MQTT_MTLS: ${MG_AGENT_MQTT_MTLS}
      MG_AGENT_BROKER_URL: ${MG_AGENT_BROKER_URL}
      MG_AGENT_NODERED_URL: ${MG_AGENT_NODERED_URL}
      MG_AGENT_HEARTBEAT_INTERVAL: ${MG_AGENT_HEARTBEAT_INTERVAL}
      MG_AGENT_TERMINAL_SESSION_TIMEOUT: ${MG_AGENT_TERMINAL_SESSION_TIMEOUT}
      MG_AGENT_BOOTSTRAP_URL: ${MG_AGENT_BOOTSTRAP_URL:-}
      MG_AGENT_BOOTSTRAP_ID: ${MG_AGENT_BOOTSTRAP_ID:-}
      MG_AGENT_BOOTSTRAP_KEY: ${MG_AGENT_BOOTSTRAP_KEY:-}
      MG_AGENT_BOOTSTRAP_RETRIES: ${MG_AGENT_BOOTSTRAP_RETRIES:-5}
      MG_AGENT_BOOTSTRAP_RETRY_DELAY_SECONDS: ${MG_AGENT_BOOTSTRAP_RETRY_DELAY_SECONDS:-10}
      MG_AGENT_BOOTSTRAP_SKIP_TLS: ${MG_AGENT_BOOTSTRAP_SKIP_TLS:-false}
    volumes:
      - ../configs/config.toml:/config.toml
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro

  ui:
    image: magistrala/ui:latest
    container_name: agent-ui
    restart: on-failure
    ports:
      - "${MG_UI_PORT}:${MG_UI_PORT}"
    networks:
      - magistrala-agent-base-net
    environment:
      MG_UI_PORT: ${MG_UI_PORT}
